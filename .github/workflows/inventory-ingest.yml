name: inventory-ingest

# Digest an uploaded Laura product xlsx into the store: create net-new products
# as DRAFTS (pending dashboard confirmation) and record them in store_products.
# Dispatched by the dashboard upload flow with the blob URL + customer id.

on:
  workflow_dispatch:
    inputs:
      blob_url:
        description: 'URL of the uploaded blob to ingest'
        type: string
        required: true
      customer_id:
        description: 'Tenant the blob belongs to'
        type: string
        required: true
      dry_run:
        description: 'Parse + group + report what would be created, but write nothing'
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: pip install -e ".[postgres]"
      - name: Ingest blob
        env:
          # --- Shopify (create products / collections) ---
          SHOPIFY_STORE_URL: ${{ vars.SHOPIFY_STORE_URL }}
          SHOPIFY_ADMIN_API_TOKEN: ${{ secrets.SHOPIFY_ADMIN_API_TOKEN }}
          SHOPIFY_MYSHOPIFY_DOMAIN: ${{ vars.SHOPIFY_MYSHOPIFY_DOMAIN }}
          SHOPIFY_API_VERSION: ${{ vars.SHOPIFY_API_VERSION }}
          # --- Vendor (config load) ---
          VENDOR_NAME: ${{ vars.VENDOR_NAME }}
          VENDOR_URL: ${{ vars.VENDOR_URL }}
          VENDOR_STORE_TAG: ${{ vars.VENDOR_STORE_TAG }}
          # --- Persistent state (Neon) ---
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # --- Axiom centralized logging (ingest_* events, customer_id-bound) ---
          AXIOM_API_URL: ${{ vars.AXIOM_API_URL }}
          AXIOM_API_TOKEN: ${{ secrets.AXIOM_API_TOKEN }}
          AXIOM_DATASET: ${{ vars.AXIOM_DATASET }}
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            python -m inventory_sync ingest \
              --blob-url "${{ inputs.blob_url }}" \
              --customer-id "${{ inputs.customer_id }}" \
              --dry-run
          else
            python -m inventory_sync ingest \
              --blob-url "${{ inputs.blob_url }}" \
              --customer-id "${{ inputs.customer_id }}"
          fi
