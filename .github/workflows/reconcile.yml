name: reconcile

# Activate approved draft products (draft → active) + delete rejected ones, for
# one customer, across ALL suppliers (vendor-agnostic). Runs hourly on a cron so
# confirmed products go live automatically, and on dashboard "Activate now"
# dispatch for immediate activation. (The main sync also reconciles inline.)

on:
  workflow_dispatch:
    inputs:
      customer_id:
        description: 'Tenant to reconcile'
        type: string
        required: true
        default: 'maxbaby'
  schedule:
    - cron: '45 * * * *'   # hourly at :45 (offset from sync.yml :00)

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: pip install -e ".[postgres]"
      - name: Reconcile approved drafts
        env:
          SHOPIFY_STORE_URL: ${{ vars.SHOPIFY_STORE_URL }}
          SHOPIFY_ADMIN_API_TOKEN: ${{ secrets.SHOPIFY_ADMIN_API_TOKEN }}
          SHOPIFY_MYSHOPIFY_DOMAIN: ${{ vars.SHOPIFY_MYSHOPIFY_DOMAIN }}
          SHOPIFY_API_VERSION: ${{ vars.SHOPIFY_API_VERSION }}
          VENDOR_NAME: ${{ vars.VENDOR_NAME }}
          VENDOR_URL: ${{ vars.VENDOR_URL }}
          VENDOR_STORE_TAG: ${{ vars.VENDOR_STORE_TAG }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AXIOM_API_URL: ${{ vars.AXIOM_API_URL }}
          AXIOM_API_TOKEN: ${{ secrets.AXIOM_API_TOKEN }}
          AXIOM_DATASET: ${{ vars.AXIOM_DATASET }}
        run: |
          # Scheduled runs have no inputs → default to maxbaby.
          CUSTOMER_ID="${{ inputs.customer_id }}"; CUSTOMER_ID="${CUSTOMER_ID:-maxbaby}"
          python -m inventory_sync reconcile --customer-id "$CUSTOMER_ID"
