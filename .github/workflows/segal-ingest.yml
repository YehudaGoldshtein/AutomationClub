name: segal-ingest

# Ingest Segal Baby products from the WooCommerce Store API: create net-new
# products as DRAFTS (pending dashboard confirmation) and record them in
# store_products. No upload — pulls the in-scope categories directly from the API.

on:
  workflow_dispatch:
    inputs:
      customer_id:
        description: 'Tenant to ingest into'
        type: string
        required: true
        default: 'maxbaby'
      dry_run:
        description: 'Fetch + report what would be created, but write nothing'
        type: boolean
        default: true

jobs:
  segal-ingest:
    runs-on: ubuntu-latest
    # ~121 products, each: 1 tab GET + create + collections + stock. Ample headroom.
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: pip install -e ".[postgres]"
      - name: Segal ingest
        env:
          # --- Shopify (create products / collections) ---
          SHOPIFY_STORE_URL: ${{ vars.SHOPIFY_STORE_URL }}
          SHOPIFY_ADMIN_API_TOKEN: ${{ secrets.SHOPIFY_ADMIN_API_TOKEN }}
          SHOPIFY_MYSHOPIFY_DOMAIN: ${{ vars.SHOPIFY_MYSHOPIFY_DOMAIN }}
          SHOPIFY_API_VERSION: ${{ vars.SHOPIFY_API_VERSION }}
          # --- Vendor (config load only; Segal adapter uses its own base URL) ---
          VENDOR_NAME: ${{ vars.VENDOR_NAME }}
          VENDOR_URL: ${{ vars.VENDOR_URL }}
          VENDOR_STORE_TAG: ${{ vars.VENDOR_STORE_TAG }}
          # --- Persistent state (Neon) ---
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # --- Axiom centralized logging (segal_ingest_* events, customer_id-bound) ---
          AXIOM_API_URL: ${{ vars.AXIOM_API_URL }}
          AXIOM_API_TOKEN: ${{ secrets.AXIOM_API_TOKEN }}
          AXIOM_DATASET: ${{ vars.AXIOM_DATASET }}
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            python -m inventory_sync segal-ingest --customer-id "${{ inputs.customer_id }}" --dry-run
          else
            python -m inventory_sync segal-ingest --customer-id "${{ inputs.customer_id }}"
          fi
